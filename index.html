<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>\u0411\u0440\u0435\u0439\u043d\u0428\u043e\u043a \u2014 \u041a\u0432\u0438\u0437</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c10;
      --card: #13141a;
      --border: #1e2030;
      --accent: #f0e040;
      --accent2: #ff4e6a;
      --text: #e8e8f0;
      --muted: #5a5b6e;
      --correct: #2ddd8a;
      --wrong: #ff4e6a;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(240,224,64,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,224,64,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blobs */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240,224,64,0.07) 0%, transparent 70%);
      top: -200px; left: -200px;
      pointer-events: none;
      z-index: 0;
      animation: blobmove 12s ease-in-out infinite alternate;
    }

    @keyframes blobmove {
      from { transform: translate(0, 0); }
      to   { transform: translate(120px, 80px); }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadedown 0.6s ease both;
    }

    .logo {
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      font-size: clamp(28px, 6vw, 48px);
      letter-spacing: -1px;
      color: var(--accent);
      text-shadow: 0 0 40px rgba(240,224,64,0.35);
      line-height: 1;
    }

    .logo span { color: var(--accent2); }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Progress */
    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 12px rgba(240,224,64,0.6);
    }

    .progress-label {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: 'Unbounded', sans-serif;
    }

    /* Score badge */
    .score-badge {
      position: fixed;
      top: 20px; right: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 18px;
      font-family: 'Unbounded', sans-serif;
      font-size: 13px;
      z-index: 10;
      animation: fadedown 0.6s 0.2s ease both;
    }

    .score-badge span { color: var(--accent); }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px;
      animation: fadein 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 24px 24px 0 0;
    }

    .category-tag {
      display: inline-block;
      background: rgba(240,224,64,0.1);
      color: var(--accent);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .question {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(16px, 3.5vw, 22px);
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 32px;
      color: #fff;
    }

    /* Options */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 480px) {
      .options { grid-template-columns: 1fr; }
    }

    .option {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      text-align: left;
      transition: all 0.2s ease;
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      line-height: 1.4;
    }

    .option:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(240,224,64,0.06);
      transform: translateY(-2px);
    }

    .option-letter {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Unbounded', sans-serif;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      color: var(--muted);
      transition: all 0.2s;
    }

      border-color: var(--correct);
      background: rgba(45,
